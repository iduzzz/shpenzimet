<!DOCTYPE html>
<html lang="sq" style="background:#ffffff">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Shpenzimet">
<title>Shpenzimet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { background: #ffffff !important; }

body {
  font-family: 'Frutiger','Frutiger LT Pro','Nunito',-apple-system,BlinkMacSystemFont,sans-serif;
  background: #f7f7f8 !important;
  color: #111111;
  min-height: 100vh;
  padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px));
  -webkit-font-smoothing: antialiased;
  forced-color-adjust: none;
}

/* Force light everywhere */
@media (prefers-color-scheme: dark) {
  html, body, * { forced-color-adjust: none; }
  body { background: #f7f7f8 !important; color: #111111 !important; }
}

/* ─── HEADER ─── */
.hdr {
  background: #ffffff;
  border-bottom: 1px solid #e8e8ec;
  padding: calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  position: sticky; top: 0; z-index: 99;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-title { font-size: 17px; font-weight: 800; color: #111111; letter-spacing: -0.3px; }
.hdr-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: #f0f0f5; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #555566;
}
.hdr-btn:active { opacity: 0.6; }

/* ─── HERO ─── */
.hero {
  background: #ffffff;
  padding: 30px 24px 24px;
  text-align: center;
  border-bottom: 1px solid #e8e8ec;
}
.hero-label { font-size: 13px; font-weight: 600; color: #888899; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.hero-num { font-size: 52px; font-weight: 800; color: #111111; letter-spacing: -3px; line-height: 1; }
.hero-num .cur { font-size: 20px; font-weight: 600; color: #aaaabc; letter-spacing: 0px; margin-left: 4px; }
.hero-period { font-size: 13px; color: #aaaabc; font-weight: 500; margin: 6px 0 20px; }
.hero-row { display: flex; gap: 10px; justify-content: center; }
.hero-pill {
  display: flex; align-items: center; gap: 8px;
  background: #f7f7f8; border-radius: 22px;
  padding: 9px 18px; border: 1px solid #e8e8ec;
}
.hero-pill-dot { width: 8px; height: 8px; border-radius: 50%; }
.hero-pill-lbl { font-size: 12px; font-weight: 600; color: #888899; }
.hero-pill-val { font-size: 14px; font-weight: 800; color: #111111; }

/* ─── DATE ROW ─── */
.date-row {
  display: flex; gap: 8px; align-items: center;
  padding: 14px 16px 0;
}
.date-inp {
  flex: 1; background: #ffffff; border: 1px solid #e0e0ea;
  border-radius: 10px; padding: 9px 12px;
  font-size: 13px; font-weight: 600; color: #111111;
  font-family: inherit; outline: none;
  -webkit-appearance: none; color-scheme: light;
}
.date-sep { font-size: 14px; color: #ccccdd; font-weight: 700; }
.date-clr {
  width: 30px; height: 30px; border-radius: 50%;
  background: #f0f0f5; border: none; cursor: pointer;
  font-size: 12px; font-weight: 700; color: #888899;
  display: flex; align-items: center; justify-content: center;
}

/* ─── CHIPS ─── */
.chips {
  display: flex; gap: 7px; padding: 12px 16px;
  overflow-x: auto; scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 7px 15px; border-radius: 20px;
  font-size: 13px; font-weight: 700; color: #666677;
  background: #ffffff; border: 1px solid #e0e0ea;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.chip.on { background: #3b82f6; color: #ffffff; border-color: #3b82f6; }
.chip:active { opacity: 0.7; }

/* ─── LIST ─── */
.list-lbl { font-size: 12px; font-weight: 700; color: #aaaabc; text-transform: uppercase; letter-spacing: 0.6px; padding: 0 20px 8px; }

.card-list {
  margin: 0 16px;
  background: #ffffff;
  border-radius: 16px;
  border: 1px solid #e8e8ec;
  overflow: hidden;
}

.row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid #f0f0f5;
  background: #ffffff;
}
.row:last-child { border-bottom: none; }

.row-ico {
  width: 38px; height: 38px; border-radius: 10px;
  background: #f7f7f8; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 15px; font-weight: 700; color: #111111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub { font-size: 12px; color: #aaaabc; font-weight: 500; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.row-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.row-note { font-size: 11px; color: #ccccdd; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.row-amt { font-size: 15px; font-weight: 800; color: #111111; }
.row-amt .cur { font-size: 10px; font-weight: 600; color: #ccccdd; margin-left: 1px; }
.row-del {
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff0f0; border: none; color: #ff4444;
  font-size: 11px; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.row-del:active { opacity: 0.6; }

.empty {
  background: #ffffff; border-radius: 16px; border: 1px solid #e8e8ec;
  margin: 0 16px; padding: 52px 20px; text-align: center;
}
.empty-ico { font-size: 40px; margin-bottom: 12px; }
.empty-t { font-size: 16px; font-weight: 800; color: #111111; margin-bottom: 5px; }
.empty-s { font-size: 13px; color: #aaaabc; font-weight: 500; }

/* ─── FAB ─── */
.fab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px calc(env(safe-area-inset-bottom,0px) + 12px);
  background: linear-gradient(to top, #f7f7f8 60%, transparent);
  z-index: 98;
}
.fab {
  width: 100%; padding: 16px; border-radius: 14px;
  background: #3b82f6; color: #ffffff; border: none;
  font-size: 16px; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: -0.2px;
  box-shadow: 0 4px 16px rgba(59,130,246,0.35);
}
.fab:active { opacity: 0.85; }

/* ─── MODAL ─── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: flex-end;
  background: rgba(17,17,17,0.18);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.overlay.on { display: flex; }

.sheet {
  width: 100%; max-width: 480px; margin: 0 auto;
  background: #f7f7f8;
  border-radius: 22px 22px 0 0;
  padding: 8px 0 calc(env(safe-area-inset-bottom,0px) + 20px);
  animation: up 0.26s cubic-bezier(0.32,0.72,0,1);
  max-height: 92vh; overflow-y: auto;
}
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-handle { width: 38px; height: 5px; background: #ddddea; border-radius: 3px; margin: 0 auto 14px; }

.sheet-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 14px; border-bottom: 1px solid #e8e8ec; margin-bottom: 6px;
}
.sheet-title { font-size: 17px; font-weight: 800; color: #111111; }
.sheet-cancel { font-size: 15px; font-weight: 600; color: #3b82f6; background: none; border: none; font-family: inherit; cursor: pointer; padding: 0; }
.sheet-cancel:active { opacity: 0.6; }

.sheet-body { padding: 0 16px; }

/* Form groups */
.fg { margin-bottom: 20px; }
.fg-lbl { font-size: 12px; font-weight: 700; color: #888899; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; margin-bottom: 7px; }

.ios-card {
  background: #ffffff; border-radius: 14px;
  border: 1px solid #e8e8ec; overflow: hidden;
}
.ios-r {
  display: flex; align-items: center; padding: 0 14px;
  min-height: 46px; border-bottom: 1px solid #f0f0f5;
}
.ios-r:last-child { border-bottom: none; }
.ios-rl { font-size: 15px; font-weight: 600; color: #111111; flex: 1; }
.ios-fi {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 15px; font-weight: 600; color: #111111;
  font-family: inherit; text-align: right; padding: 12px 0;
  -webkit-appearance: none; color-scheme: light;
}
.ios-fi::placeholder { color: #ccccdd; }
.ios-fi.big { font-size: 26px; font-weight: 800; }
.ios-unit { font-size: 13px; font-weight: 700; color: #ccccdd; margin-left: 5px; flex-shrink: 0; }

/* Segmented */
.seg { display: flex; background: #ebebf0; border-radius: 10px; padding: 3px; gap: 3px; }
.seg-b {
  flex: 1; padding: 9px; border-radius: 8px;
  font-size: 14px; font-weight: 700; color: #666677;
  border: none; background: transparent; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; transition: all 0.15s;
}
.seg-b.on { background: #ffffff; color: #111111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

/* Cat grid */
.cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.cat-t {
  background: #ffffff; border-radius: 12px; border: 1.5px solid #e8e8ec;
  padding: 11px 6px 9px; text-align: center; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.cat-t .e { font-size: 22px; }
.cat-t .n { font-size: 11px; font-weight: 700; color: #888899; }
.cat-t.sel { border-color: #3b82f6; background: #eff6ff; }
.cat-t.sel .n { color: #3b82f6; }
.cat-t:active { opacity: 0.7; }

/* Textarea */
.ta {
  width: 100%; background: #ffffff; border: 1px solid #e8e8ec;
  border-radius: 14px; padding: 13px 14px;
  font-size: 15px; font-weight: 500; color: #111111;
  font-family: inherit; outline: none; resize: none; height: 70px;
}
.ta::placeholder { color: #ccccdd; }

/* Save btn */
.save-btn {
  width: 100%; padding: 16px; background: #3b82f6; color: #ffffff;
  border: none; border-radius: 14px; font-size: 16px; font-weight: 800;
  font-family: inherit; cursor: pointer; margin-top: 6px;
  box-shadow: 0 3px 12px rgba(59,130,246,0.3);
}
.save-btn:active { opacity: 0.85; }

/* Cat mgmt */
.cm-list {
  background: #ffffff; border-radius: 14px; border: 1px solid #e8e8ec;
  overflow: hidden; margin-bottom: 14px; max-height: 44vh; overflow-y: auto;
}
.cm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-bottom: 1px solid #f0f0f5;
  background: #ffffff;
}
.cm-row:last-child { border-bottom: none; }
.cm-em { font-size: 22px; }
.cm-nm { flex: 1; font-size: 15px; font-weight: 700; color: #111111; }
.cm-del {
  width: 22px; height: 22px; border-radius: 50%;
  background: #ff4444; border: none; color: #ffffff;
  font-size: 13px; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.cm-del:active { opacity: 0.7; }

.add-row { display: flex; gap: 8px; align-items: center; }
.em-in {
  width: 48px; height: 46px; background: #ffffff;
  border: 1px solid #e8e8ec; border-radius: 12px;
  font-size: 20px; text-align: center; outline: none;
  font-family: inherit; flex-shrink: 0;
}
.nm-in {
  flex: 1; background: #ffffff; border: 1px solid #e8e8ec;
  border-radius: 12px; padding: 12px 13px;
  font-size: 15px; font-weight: 600; color: #111111;
  font-family: inherit; outline: none;
}
.nm-in::placeholder { color: #ccccdd; }
.add-btn-sm {
  width: 46px; height: 46px; border-radius: 12px;
  background: #3b82f6; border: none; color: #ffffff;
  font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(59,130,246,0.3);
}
.add-btn-sm:active { opacity: 0.8; }
.done-btn {
  width: 100%; margin-top: 14px; padding: 14px;
  background: #f0f0f5; color: #111111; border: none;
  border-radius: 14px; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">Shpenzimet</span>
  <button class="hdr-btn" id="btnCats">⚙️</button>
</div>

<div class="hero">
  <div class="hero-label">Totali</div>
  <div class="hero-num" id="totalAmt">0<span class="cur">ден</span></div>
  <div class="hero-period" id="heroPeriod">Të gjitha shpenzimet</div>
  <div class="hero-row">
    <div class="hero-pill">
      <div class="hero-pill-dot" style="background:#22c55e"></div>
      <span class="hero-pill-lbl">Kesh</span>
      <span class="hero-pill-val" id="cashAmt">0</span>
    </div>
    <div class="hero-pill">
      <div class="hero-pill-dot" style="background:#3b82f6"></div>
      <span class="hero-pill-lbl">Kartele</span>
      <span class="hero-pill-val" id="cardAmt">0</span>
    </div>
  </div>
</div>

<div class="date-row">
  <input type="date" class="date-inp" id="dFrom">
  <span class="date-sep">—</span>
  <input type="date" class="date-inp" id="dTo">
  <button class="date-clr" id="dClr">✕</button>
</div>

<div class="chips" id="chipBar"></div>

<div class="list-lbl" id="listLbl">0 shpenzime</div>
<div id="listEl"></div>

<div class="fab-bar">
  <button class="fab" id="fabBtn">+ Shto shpenzim</button>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="addModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <button class="sheet-cancel" id="cancelAdd">Anulo</button>
      <span class="sheet-title">Shpenzim i ri</span>
      <div style="width:48px"></div>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <div class="ios-card">
          <div class="ios-r">
            <span class="ios-rl">Shuma</span>
            <input type="number" class="ios-fi big" id="inAmt" placeholder="0" inputmode="decimal" min="0">
            <span class="ios-unit">ден</span>
          </div>
          <div class="ios-r">
            <span class="ios-rl">Data</span>
            <input type="date" class="ios-fi" id="inDate">
          </div>
        </div>
      </div>

      <div class="fg">
        <div class="fg-lbl">Mënyra e pagesës</div>
        <div class="seg">
          <button class="seg-b on" id="pKesh" onclick="setPay('kesh')">💵 Kesh</button>
          <button class="seg-b" id="pCard" onclick="setPay('kartele')">💳 Kartele</button>
        </div>
      </div>

      <div class="fg">
        <div class="fg-lbl">Kategoria</div>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <div class="fg">
        <div class="fg-lbl">Shënim</div>
        <textarea class="ta" id="inNote" placeholder="Opsional..."></textarea>
      </div>

      <button class="save-btn" id="saveBtn">Regjistro shpenzimin</button>
    </div>
  </div>
</div>

<!-- CAT MODAL -->
<div class="overlay" id="catModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div style="width:48px"></div>
      <span class="sheet-title">Kategorite</span>
      <button class="sheet-cancel" id="doneBtn">U krye</button>
    </div>
    <div class="sheet-body">
      <div class="cm-list" id="cmList"></div>
      <div class="add-row">
        <input type="text" class="em-in" id="newEm" maxlength="2" placeholder="📦">
        <input type="text" class="nm-in" id="newNm" placeholder="Emri i kategorisë...">
        <button class="add-btn-sm" id="addCatBtn">+</button>
      </div>
      <button class="done-btn" id="doneBtnB">U krye ✓</button>
    </div>
  </div>
</div>

<script>
const DB = {
  get ex() { return JSON.parse(localStorage.getItem('shp_ex')||'[]'); },
  set ex(v) { localStorage.setItem('shp_ex',JSON.stringify(v)); },
  get cats() {
    const d=[
      {id:'ushqim',n:'Ushqim',e:'🛒'},{id:'restoran',n:'Restorant',e:'🍽️'},
      {id:'transport',n:'Transport',e:'🚗'},{id:'shendeti',n:'Shëndetësi',e:'💊'},
      {id:'veshje',n:'Veshje',e:'👗'},{id:'shtepie',n:'Shtëpi',e:'🏠'},
      {id:'argetime',n:'Argëtim',e:'🎬'},{id:'komunikim',n:'Komun.',e:'📱'},
      {id:'tjera',n:'Tjera',e:'📦'},
    ];
    return JSON.parse(localStorage.getItem('shp_cats')||JSON.stringify(d));
  },
  set cats(v) { localStorage.setItem('shp_cats',JSON.stringify(v)); }
};

const fmt = n => Number(n).toLocaleString('mk-MK');
const td = () => new Date().toISOString().slice(0,10);

let selCat=null, selPay='kesh', fCat='all', dF='', dT='';

function setPay(p) {
  selPay=p;
  document.getElementById('pKesh').classList.toggle('on',p==='kesh');
  document.getElementById('pCard').classList.toggle('on',p==='kartele');
}

function renderChips() {
  let h=`<button class="chip ${fCat==='all'?'on':''}" onclick="setF('all')">Të gjitha</button>`;
  DB.cats.forEach(c=>{ h+=`<button class="chip ${fCat===c.id?'on':''}" onclick="setF('${c.id}')">${c.e} ${c.n}</button>`; });
  document.getElementById('chipBar').innerHTML=h;
}

function setF(id){fCat=id;renderChips();render();}

function getList(){
  let l=[...DB.ex].reverse();
  if(fCat!=='all') l=l.filter(e=>e.cid===fCat);
  if(dF) l=l.filter(e=>e.d>=dF);
  if(dT) l=l.filter(e=>e.d<=dT);
  return l;
}

function render(){
  const l=getList();
  const tot=l.reduce((s,e)=>s+Number(e.a),0);
  const cash=l.filter(e=>e.p==='kesh').reduce((s,e)=>s+Number(e.a),0);
  const card=l.filter(e=>e.p==='kartele').reduce((s,e)=>s+Number(e.a),0);
  document.getElementById('totalAmt').innerHTML=`${fmt(tot)}<span class="cur">ден</span>`;
  document.getElementById('cashAmt').textContent=fmt(cash);
  document.getElementById('cardAmt').textContent=fmt(card);
  document.getElementById('listLbl').textContent=`${l.length} shpenzime`;
  let per='Të gjitha shpenzimet';
  if(dF&&dT) per=`${dF} — ${dT}`;
  else if(dF) per=`Nga ${dF}`;
  else if(dT) per=`Deri ${dT}`;
  else if(fCat!=='all'){const c=DB.cats.find(x=>x.id===fCat);if(c)per=`${c.e} ${c.n}`;}
  document.getElementById('heroPeriod').textContent=per;
  const el=document.getElementById('listEl');
  if(!l.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">💸</div><div class="empty-t">Nuk ka shpenzime</div><div class="empty-s">Shtype "+ Shto shpenzim" për të filluar</div></div>`;
    return;
  }
  const rows=l.map(e=>{
    const cat=DB.cats.find(c=>c.id===e.cid)||{n:e.cid,e:'📦'};
    const dc=e.p==='kesh'?'#22c55e':'#3b82f6';
    return `<div class="row">
      <div class="row-ico">${cat.e}</div>
      <div class="row-info">
        <div class="row-name">${cat.n}</div>
        <div class="row-sub"><span class="row-dot" style="background:${dc}"></span><span>${e.p==='kesh'?'Kesh':'Kartele'}</span><span>·</span><span>${e.d}</span></div>
        ${e.nt?`<div class="row-note">${e.nt}</div>`:''}
      </div>
      <div class="row-right">
        <div class="row-amt">${fmt(e.a)}<span class="cur">ден</span></div>
        <button class="row-del" onclick="delE('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="card-list">${rows}</div>`;
}

function renderCatGrid(){
  document.getElementById('catGrid').innerHTML=DB.cats.map(c=>
    `<div class="cat-t ${selCat===c.id?'sel':''}" onclick="sc('${c.id}')"><span class="e">${c.e}</span><span class="n">${c.n}</span></div>`
  ).join('');
}

function sc(id){selCat=id;renderCatGrid();}

function openAdd(){
  selCat=null;selPay='kesh';
  document.getElementById('inAmt').value='';
  document.getElementById('inDate').value=td();
  document.getElementById('inNote').value='';
  setPay('kesh');renderCatGrid();
  document.getElementById('addModal').classList.add('on');
  setTimeout(()=>document.getElementById('inAmt').focus(),300);
}

function closeM(id){document.getElementById(id).classList.remove('on');}

document.getElementById('fabBtn').onclick=openAdd;
document.getElementById('cancelAdd').onclick=()=>closeM('addModal');
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeM('addModal');});
document.getElementById('catModal').addEventListener('click',function(e){if(e.target===this)closeM('catModal');});

document.getElementById('saveBtn').onclick=function(){
  const a=parseFloat(document.getElementById('inAmt').value);
  const d=document.getElementById('inDate').value;
  const nt=document.getElementById('inNote').value.trim();
  const inp=document.getElementById('inAmt');
  if(!a||a<=0){inp.style.color='#ff4444';setTimeout(()=>inp.style.color='',1200);return;}
  if(!selCat){
    const g=document.getElementById('catGrid');
    g.style.outline='2px solid #ff4444';g.style.borderRadius='12px';
    setTimeout(()=>{g.style.outline='';},1200);return;
  }
  const ex=DB.ex;
  ex.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),a,d,cid:selCat,p:selPay,nt,ts:Date.now()});
  DB.ex=ex;closeM('addModal');render();renderChips();
};

function delE(id){
  if(!confirm('Fshi këtë shpenzim?'))return;
  DB.ex=DB.ex.filter(e=>e.id!==id);render();
}

document.getElementById('btnCats').onclick=()=>{renderCM();document.getElementById('catModal').classList.add('on');};
document.getElementById('doneBtn').onclick=()=>{closeM('catModal');renderChips();render();};
document.getElementById('doneBtnB').onclick=()=>{closeM('catModal');renderChips();render();};

function renderCM(){
  document.getElementById('cmList').innerHTML=DB.cats.map(c=>
    `<div class="cm-row"><span class="cm-em">${c.e}</span><span class="cm-nm">${c.n}</span><button class="cm-del" onclick="delCat('${c.id}')">−</button></div>`
  ).join('');
}

function delCat(id){
  if(DB.ex.some(e=>e.cid===id)&&!confirm('Ka shpenzime. Fshi?'))return;
  DB.cats=DB.cats.filter(c=>c.id!==id);renderCM();
}

document.getElementById('addCatBtn').onclick=function(){
  const e=document.getElementById('newEm').value.trim()||'📦';
  const n=document.getElementById('newNm').value.trim();
  if(!n)return;
  const cats=DB.cats;
  cats.push({id:n.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now().toString(36),n,e});
  DB.cats=cats;
  document.getElementById('newEm').value='';
  document.getElementById('newNm').value='';
  renderCM();
};

document.getElementById('dFrom').onchange=function(){dF=this.value;render();};
document.getElementById('dTo').onchange=function(){dT=this.value;render();};
document.getElementById('dClr').onclick=function(){
  dF='';dT='';
  document.getElementById('dFrom').value='';
  document.getElementById('dTo').value='';
  render();
};

renderChips();render();
</script>
</body>
</html>
